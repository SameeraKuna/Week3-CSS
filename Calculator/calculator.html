<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="./calculator.css">
</head>
<body>
    <h1>Calculator</h1>
    <!-- For calculator outer -->
    <div class="outer">
        <!-- For container -->
         <div class="container">
            <!-- For Output of Calculator -->
            <div class="item row1">
                <input type="text">
            </div>
            <br />
            <!-- For row 2 -->
            <div class="row2">
                <div class="item">
                    <button class="c">C</button>
                </div>
                <div class="item arrow">
                    <button>&larr;</button>
                </div>
                <div class="item">
                    <button class="slash">/</button>
                </div>
                <div class="item">
                    <button class="star">*</button>
                </div>
            </div>
            <!-- For row 3 -->
            <div class="row3">
               <div class="item seven">
                    <button>7</button>
                </div>
                <div class="item eight">
                    <button>8</button>
                </div>
                <div class="item nine">
                    <button>9</button>
                </div>
                <div class="item">
                    <button class="minus">-</button>
                </div> 
            </div>
            <!-- For row 4 -->
            <div class="row4">
                <div class="item four">
                    <button>4</button>
                </div>
                <div class="item five">
                    <button>5</button>
                </div>
                <div class="item six">
                    <button>6</button>
                </div>
                <div class="item">
                    <button class="plus">+</button>
                </div> 
            </div>
            <div class="row5">
                <div class="item one">
                    <button>1</button>
                </div>
                <div class="item two">
                    <button>2</button>
                </div>
                <div class="item three">
                    <button>3</button>
                </div>
                <div class="item">
                    <button class="equalto">=</button>
                </div> 
            </div>
            <div class="row6">
                <div class="item zero">
                    <button>0</button>
                </div>
                <div class="item dot">
                    <button>.</button>
                </div> 
            </div>
         </div>

    </div>
</body>
</html>
